# VMTools Next — Docker Compose
# Services: app + nginx + optional redis

version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: app
    container_name: vmtools-next-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../config:/app/config
      - ../data:/app/data
      - ../logs:/app/logs
    environment:
      - VMT_ENV=prod
      - VMT_SERVER_HOST=0.0.0.0
      - VMT_SERVER_PORT=8080
      - VMT_SERVER_DATABASE_URL=sqlite:///data/vmtools-next.db
      - VMT_SERVER_SECRET_KEY=${VMT_SECRET_KEY:-change-me-in-production}
      - SITE_ADMIN_GAME_ID=${SITE_ADMIN_GAME_ID:-VenusYu}
      - SITE_ADMIN_PASSWORD=${SITE_ADMIN_PASSWORD:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: nginx
    container_name: vmtools-next-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/vmtools-next.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

  # Optional: Redis for caching/sessions
