# loguru 日志策略
version: 1
formatters:
  default:
    format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} | {message}"
  json:
    format: "{{"time":"{time:YYYY-MM-DDTHH:mm:ssZ}","level":"{level}","logger":"{name}","msg":"{message}"}}"
handlers:
  console:
    formatter: default
    level: INFO
  file:
    formatter: default
    level: DEBUG
    rotation: "10 MB"
    retention: "30 days"
    compression: "zip"
    path: "logs/vmtools-next.log"
  error_file:
    formatter: default
    level: ERROR
    rotation: "10 MB"
    retention: "30 days"
    path: "logs/vmtools-next-error.log"
loggers:
  vmtools_next:
    level: DEBUG
    handlers: [console, file, error_file]
  mcc:
    level: INFO
    handlers: [console, file]
root:
  level: WARNING
  handlers: [console]
